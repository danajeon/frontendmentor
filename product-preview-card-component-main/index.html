<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Dongle&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&display=swap"
    rel="stylesheet">

  <title>Frontend Mentor | Product preview card component</title>

  <style>
    .attribution {
      font-size: 11px;
      text-align: center;
    }

    .attribution a {
      color: hsl(228, 45%, 44%);
    }
  </style>
</head>

<body>
  <article>
    <div class="image-container">
      <img class="desktop" src="images/image-product-desktop.jpg"
        alt="Gabrielle Essence Eau De Parfum in bottle (desktop)">
      <img class="mobile" src="images/image-product-mobile.jpg"
        alt="Gabrielle Essence Eau De Parfum in bottle, (mobile)">
    </div>
    <div class="description-container">
      <small class="category">PERFUME</small>
      <h1>Gabrielle Essence Eau De Parfum</h1>
      <p class="description">A floral, solar and voluptuous interpretation composed by Olivier Polge, Perfumer-Creator
        for
        the House of CHANEL.</p>
      <p class="price">
        <span class="sale-price">$149.99</span>
        <span class="original-price">$169.99</span>
      </p>
      <button type="button">
        <img src="/images/icon-cart.svg" alt="cart icon">
        Add to Cart
      </button>
    </div>
  </article>
  <!-- <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.
    Coded by <a href="#">Your Name Here</a>.
  </div> -->
</body>

</html>
